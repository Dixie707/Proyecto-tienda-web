<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resultados | JolenSport</title>

    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div th:replace="fragmentos/header :: header"></div>

<section class="seccion-resultados">

    <h2 class="titulo-seccion">Resultados de búsqueda</h2>

    <p class="texto-busqueda" th:if="${query != null}">
        Mostrando resultados para:
        <strong th:text="${query}"></strong>
    </p>

    <div class="sin-resultados" th:if="${#lists.isEmpty(productos)}">
        <h3>No se encontraron productos</h3>
        <p>Intentá buscar con otra palabra.</p>
        <a th:href="@{/}" class="btn-volver">Volver al inicio</a>
    </div>

    <div class="grid-productos" th:if="${!#lists.isEmpty(productos)}">

        <div class="producto-card" th:each="producto : ${productos}">

            <a th:href="@{/favoritos/agregar/{id}(id=${producto.id})}" class="btn-favorito">
                <i class="fa-regular fa-heart"></i>
            </a>

            <a th:href="@{/producto/detalle/{id}(id=${producto.id})}">
                <img th:src="@{${producto.imagenUrl}}"
                     th:alt="${producto.nombre}"
                     class="producto-img">
            </a>

            <div class="producto-info">
                <a th:href="@{/producto/detalle/{id}(id=${producto.id})}">
                    <h3 th:text="${producto.nombre}"></h3>
                </a>

                <p th:text="${producto.descripcion}"></p>

                <h4>
                    ₡ <span th:text="${producto.precio}"></span>
                </h4>

                <!-- 🔥 CORREGIDO -->
                <form th:action="@{/carrito/agregar/{id}(id=${producto.id})}" method="post" class="form-agregar">
                    <button type="submit" class="btn-jolen">
                        Agregar al carrito
                    </button>
                </form>

            </div>

        </div>

    </div>

</section>

</body>
</html>
