<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Error | JolenSport</title>

    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f3f3;
        }

        .contenedor {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            padding: 40px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }

        .box h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .box p {
            color: #666;
            margin-bottom: 20px;
        }

        .btn {
            text-decoration: none;
            background: black;
            color: white;
            padding: 12px 22px;
            border-radius: 999px;
            font-weight: bold;
        }

        .btn:hover {
            background: #222;
        }
    </style>
</head>
<body>

<div th:replace="fragmentos/header :: header"></div>

<div class="contenedor">
    <div class="box">
        <h1>Oops 😅</h1>
        <p>La página no existe o ocurrió un error.</p>

        <a th:href="@{/}" class="btn">Volver al inicio</a>
    </div>
</div>

</body>
</html>
