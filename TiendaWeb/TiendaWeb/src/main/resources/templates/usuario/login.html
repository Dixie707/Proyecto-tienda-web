<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Inicio de Sesión | JolenSport</title>
        <link rel="stylesheet" th:href="@{/css/usuario.css}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>
    <body>

        <div class="auth-page">

            <div class="top-bar">
                <a th:href="@{/}" class="icon-link"><i class="fas fa-search"></i></a>

                <div class="top-icons-right">
                    <a th:href="@{/usuario/login}" class="icon-link"><i class="far fa-user-circle"></i></a>
                    <a th:href="@{/carrito}" class="icon-link"><i class="fas fa-cart-shopping"></i></a>
                </div>
            </div>

            <div class="auth-card">
                <img th:src="@{/img/logo-jolensport.png}" alt="JolenSport" class="logo-img"
                     onerror="this.style.display='none'; document.getElementById('logoTexto').style.display='block';">

                <div id="logoTexto" class="logo-fallback" style="display:none;">J</div>
                <h1 class="brand">JolenSport</h1>
                <h2 class="auth-title">Inicio de Sesión</h2>

                <div th:if="${error}" class="mensaje-error" th:text="${error}"></div>
                <div th:if="${exito}" class="mensaje-exito" th:text="${exito}"></div>

                <form th:action="@{/usuario/login}" method="post" class="auth-form">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" name="correo" placeholder="Ingresar correo electrónico" required>

                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="Ingresar contraseña" required>

                    <button type="submit" class="btn-auth">Iniciar Sesión</button>
                </form>

                <p class="forgot-password">
                    <a th:href="@{/usuario/recuperar}">¿Olvidaste tu contraseña?</a>
                </p>

                <p class="auth-switch">
                    ¿No tienes cuenta?
                    <a th:href="@{/usuario/registro}">Registrarse</a>
                </p>

                <div class="social-login">
                    <i class="fab fa-google google"></i>
                    <i class="fab fa-facebook facebook"></i>
                </div>
            </div>
        </div>

    </body>
</html>
