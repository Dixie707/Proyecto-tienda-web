<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${producto.id != null} ? 'Editar producto' : 'Nuevo producto'">Producto</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #efefef;
            color: #111;
        }

        .contenedor {
            max-width: 900px;
            margin: 40px auto;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .encabezado {
            background: #000;
            color: #fff;
            padding: 22px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .encabezado h2 {
            margin: 0;
            font-size: 1.8rem;
        }

        .acciones-top a {
            text-decoration: none;
            background: #fff;
            color: #111;
            padding: 10px 16px;
            border-radius: 999px;
            font-weight: 700;
            margin-left: 10px;
            display: inline-block;
        }

        .contenido {
            padding: 28px;
        }

        .fila {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-bottom: 18px;
        }

        .grupo {
            display: flex;
            flex-direction: column;
        }

        .grupo label {
            font-weight: 700;
            margin-bottom: 8px;
        }

        .grupo input,
        .grupo textarea,
        .grupo select {
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 1rem;
            font-family: Arial, sans-serif;
        }

        .grupo textarea {
            min-height: 120px;
            resize: vertical;
        }

        .acciones-form {
            margin-top: 22px;
            display: flex;
            gap: 12px;
        }

        .btn {
            border: none;
            padding: 12px 20px;
            border-radius: 999px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-guardar {
            background: #000;
            color: #fff;
        }

        .btn-cancelar {
            background: #ddd;
            color: #111;
        }

        .error {
            color: #c00000;
            font-size: 0.9rem;
            margin-top: 6px;
        }

        @media (max-width: 700px) {
            .fila {
                grid-template-columns: 1fr;
            }

            .encabezado {
                flex-direction: column;
                gap: 14px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="encabezado">
        <h2 th:text="${producto.id != null} ? 'Editar producto' : 'Nuevo producto'"></h2>

        <div class="acciones-top">
            <a th:href="@{/producto/lista}">Volver</a>
        </div>
    </div>

    <div class="contenido">
        <form th:action="@{/producto/guardar}" th:object="${producto}" method="post" enctype="multipart/form-data">

            <input type="hidden" th:field="*{id}">

            <div class="fila">
                <div class="grupo">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" th:field="*{nombre}">
                    <div class="error" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                </div>

                <div class="grupo">
                    <label for="precio">Precio</label>
                    <input type="number" step="0.01" id="precio" th:field="*{precio}">
                    <div class="error" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}"></div>
                </div>
            </div>

            <div class="fila">
                <div class="grupo">
                    <label for="stock">Stock</label>
                    <input type="number" id="stock" th:field="*{stock}">
                    <div class="error" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
                </div>

                <div class="grupo">
                    <label for="categoria">Categoría</label>
                    <select id="categoria" th:field="*{categoria}">
                        <option value="">Seleccione una categoría</option>
                        <option th:each="c : ${categorias}"
                                th:value="${c.id}"
                                th:text="${c.nombre}">
                        </option>
                    </select>
                </div>
            </div>

            <div class="grupo" style="margin-bottom: 18px;">
                <label for="descripcion">Descripción</label>
                <textarea id="descripcion" th:field="*{descripcion}"></textarea>
                <div class="error" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
            </div>

            <div class="fila">
                <div class="grupo">
                    <label for="imagen">Imagen</label>
                    <input type="file" id="imagen" name="imagen" accept="image/*">
                </div>

                <div class="grupo">
                    <label for="activo">Activo</label>
                    <select id="activo" th:field="*{activo}">
                        <option th:value="true">Sí</option>
                        <option th:value="false">No</option>
                    </select>
                </div>
            </div>

            <div class="acciones-form">
                <button type="submit" class="btn btn-guardar">Guardar</button>
                <a th:href="@{/producto/lista}" class="btn btn-cancelar">Cancelar</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
