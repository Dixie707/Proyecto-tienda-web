<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Comprobante</title>
    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#f4f4f4;
        }
        .contenedor{
            max-width:800px;
            margin:50px auto;
            background:#fff;
            padding:35px;
            border-radius:16px;
            box-shadow:0 8px 24px rgba(0,0,0,0.08);
            text-align:center;
        }
        h1{
            color:#111;
        }
        .dato{
            font-size:1.1rem;
            margin:14px 0;
        }
        .btn{
            display:inline-block;
            margin-top:20px;
            padding:14px 26px;
            background:#000;
            color:#fff;
            text-decoration:none;
            border-radius:999px;
            font-weight:bold;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>Compra realizada con éxito</h1>

        <div class="dato">Pedido #<span th:text="${pedido.id}"></span></div>
        <div class="dato">Fecha: <span th:text="${pedido.fecha}"></span></div>
        <div class="dato">Total: ₡ <span th:text="${pedido.total}"></span></div>
        <div class="dato">Método de pago: <span th:text="${pedido.medioPago}"></span></div>

        <a th:href="@{/}" class="btn">Volver a la tienda</a>
    </div>
</body>
</html>
