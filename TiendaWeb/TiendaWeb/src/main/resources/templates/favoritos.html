<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Mis favoritos | JolenSport</title>

        <link rel="stylesheet" th:href="@{/css/styles.css}">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    </head>
    <body>

        <div th:replace="fragmentos/header :: header"></div>

        <section class="favoritos-page">

            <h2 class="titulo-seccion">Mis favoritos <i class="fa-solid fa-heart"></i></h2>

            <div th:if="${#lists.isEmpty(favoritos)}" class="sin-resultados">
                <h3>No tienes productos favoritos</h3>
                <p>Agregá productos tocando el corazón.</p>
                <a th:href="@{/}" class="btn-volver">Volver a comprar</a>
            </div>

            <div class="grid-productos" th:if="${!#lists.isEmpty(favoritos)}">

                <div th:each="f : ${favoritos}" class="producto-card">

                    <a th:href="@{/favoritos/agregar/{id}(id=${f.producto.id})}" class="btn-favorito activo">
                        <i class="fa-solid fa-heart"></i>
                    </a>

                    <a th:href="@{/producto/detalle/{id}(id=${f.producto.id})}">
                        <img th:src="@{${f.producto.imagenUrl}}"
                             th:alt="${f.producto.nombre}"
                             class="producto-img">
                    </a>

                    <div class="producto-info">
                        <a th:href="@{/producto/detalle/{id}(id=${f.producto.id})}" style="text-decoration:none; color:inherit;">
                            <div class="producto-nombre" th:text="${f.producto.nombre}"></div>
                        </a>

                        <div class="producto-desc" th:text="${f.producto.descripcion}"></div>
                        <div class="producto-precio" th:text="'₡ ' + ${f.producto.precio}"></div>

                        <!-- 🔥 CORREGIDO -->
                        <form th:action="@{/carrito/agregar/{id}(id=${f.producto.id})}" method="post">
                            <button type="submit" class="btn-jolen">
                                Agregar al carrito
                            </button>
                        </form>

                        <a th:href="@{/favoritos/agregar/{id}(id=${f.producto.id})}" class="btn-quitar">
                            Quitar de favoritos
                        </a>
                    </div>

                </div>

            </div>

        </section>

    </body>
</html>
